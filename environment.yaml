# Conda environment for the siphonophore literature corpus pipeline.
#
# Usage:
#     conda env create -f environment.yaml
#     conda activate corpus
#
# Most Python and system tools (tesseract, ghostscript, pymupdf) come from
# conda-forge. ocrmypdf is installed via pip because two of its optional
# native helpers (pngquant, jbig2enc) are not packaged on conda-forge for
# all platforms — notably osx-arm64. ocrmypdf runs fine without them, just
# at a lower OCR optimization level. See README.md for the optional system
# install to enable full optimization.
#
# Additional Tesseract language packs (German Fraktur, French, Russian,
# Latin) are installed separately — see README.md.
#
# On HPC (Bouchet / YCRC) the same file works after `module load miniconda`.

name: corpus

channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.12
  - pip

  # PDF + OCR toolchain (native side)
  - tesseract  # English data is bundled; additional languages installed separately (see README)
  - ghostscript
  - pymupdf

  # Config, data, scientific
  - numpy
  - pillow
  - matplotlib
  - pydantic
  - pyyaml
  - python-dotenv
  - requests
  - rapidfuzz  # fuzzy title matching in biblio-authority builder
  - lxml  # TEI-XML parsing (Grobid output)

  # Notebook / interactive dev
  - ipykernel

  # Test runner
  - pytest

  # Pip-only packages
  - pip:
      - ocrmypdf  # pulls its own Python deps; finds tesseract/ghostscript on PATH from conda
      - docling
      - lancedb
      - langdetect  # language detection for scan_detection / OCR language selection (Phase C)
      - mcp  # Model Context Protocol SDK for the corpus-serving agent tools layer
      - uvicorn  # ASGI server for `mcp_server.py --transport sse`; declared explicitly so we don't rely on mcp's transitive pin
      - sentence-transformers  # local embedding backend (Phase E); pulls torch + transformers
      - torch  # imported directly in embeddings.py / vision.py; declared so we don't rely on the sentence-transformers transitive
      - transformers  # imported directly in vision.py for the local VLM backend
      - anthropic  # Claude API client for on-demand translation (translate_chunk MCP tool)
      - pytesseract  # Python wrapper for Tesseract — used in Pass 3a figure-label OCR (PLAN.md §9)
      - qwen-vl-utils  # image preprocessing for Qwen2.5-VL local VLM backend (vision.py)
      - accelerate  # HuggingFace device_map / model sharding for local VLM
