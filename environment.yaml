# Conda environment for the siphonophore literature corpus pipeline.
#
# Usage:
#     conda env create -f environment.yaml
#     conda activate corpus
#
# Most Python and system tools (tesseract, ghostscript, pymupdf, pngquant)
# come from conda-forge. ocrmypdf itself is installed via pip — its other
# optional native helper (jbig2enc) is not packaged on conda-forge for all
# platforms; ocrmypdf runs fine without it at a lower optimization level.
# See README.md for jbig2enc system-install instructions.
#
# Tesseract language packs are NOT in conda-forge (the base `tesseract`
# package ships only English LSTM data).  After creating the env, run
# `bash tools/install_tessdata.sh` to drop the default fallback set
# (deu, fra, rus, lat, spa, por, chi_sim, chi_tra, jpn, ell, kor, grc,
# deu_latf) into $CONDA_PREFIX/share/tessdata.  See INSTALL.md.
#
# On HPC (Bouchet / YCRC) the same file works after `module load miniconda`.

name: corpus

channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.12
  - pip

  # PDF + OCR toolchain (native side)
  - tesseract  # English LSTM data ships with the base package. Other
               # language packs are downloaded by tools/install_tessdata.sh
               # after env creation — none of them are on conda-forge.
  - ghostscript
  - pngquant  # ocrmypdf optional helper; substantial size savings on PDFs with many embedded color images
  - pymupdf

  # Config, data, scientific
  - numpy
  - pillow
  - matplotlib
  - pydantic
  - pyyaml
  - python-dotenv
  - requests
  - rapidfuzz  # fuzzy title matching in biblio-authority builder
  - lxml  # TEI-XML parsing (Grobid output)

  # Notebook / interactive dev
  - ipykernel

  # Test runner
  - pytest

  # Pip-only packages
  - pip:
      - ocrmypdf  # pulls its own Python deps; finds tesseract/ghostscript on PATH from conda
      - docling
      - lancedb
      - langdetect  # language detection for scan_detection / OCR language selection (Phase C)
      - mcp  # Model Context Protocol SDK for the corpus-serving agent tools layer
      - uvicorn  # ASGI server for `mcp_server.py --transport sse`; declared explicitly so we don't rely on mcp's transitive pin
      - sentence-transformers  # local embedding backend (Phase E); pulls torch + transformers
      - torch  # imported directly in pipeline/embeddings.py / pipeline/vision.py. On Bouchet this PyPI build is CUDA 13; reinstall from the cu128 index — see dev_docs/BOUCHET.md (issue #21).
      - transformers  # imported directly in pipeline/vision.py for the local VLM backend
      - anthropic  # Claude API client for on-demand translation (translate_chunk MCP tool)
      - pytesseract  # Python wrapper for Tesseract — used in Pass 3a figure-label OCR (dev_docs/PLAN.md §9)
      - qwen-vl-utils  # image preprocessing for Qwen2.5-VL local VLM backend (pipeline/vision.py)
      - accelerate  # HuggingFace device_map / model sharding for local VLM
