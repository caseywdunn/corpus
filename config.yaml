# Corpus-processing configuration.
#
# Loaded by process_corpus.py via load_config(). Keys here override the
# built-in _DEFAULT_CONFIG; anything missing falls through to the defaults.
# CLI flags on individual tools override config values in turn.
#
# The taxonomy and anatomy lexicon pointed at below are the current
# siphonophore-flavored defaults. To apply the pipeline to a different
# group: (a) regenerate resources/taxonomy.sqlite via
# `python ingest_taxonomy.py --source <dwc|dwca|worms> ... --root-id <ID>`,
# (b) swap resources/anatomy_lexicon.yaml for a lexicon relevant to your
# group. Everything else in the pipeline is taxon-agnostic.

# OCR settings used by process_corpus.py.
ocr:
  optimize_level: 2
  # Tesseract traineddata codes used when language detection fails or
  # a document has a broken text layer (where detection is unreliable).
  # Tesseract combines languages gracefully but slowly — narrow this
  # list if you're running against a known-monolingual subset.
  ocr_languages_default:
    - eng
    - deu
    - deu_latf    # 19th-c. German Fraktur (manual install; see dev_docs/INSTALL.md)
    - fra
    - rus
    - lat
  # Gibberish-score threshold above which a dense text layer is treated
  # as corrupt (needing --force-ocr). See _gibberish_score in
  # process_corpus.py.
  # Raised from 0.5 → 0.65: 0.5 was a false positive for MilosMaley2005
  # (valid text layer, langdetect misfired as Swahili, score=0.59).
  # Documents with truly corrupt text (Cyrillic mojibake etc.) are caught
  # by the visual_script_mismatch path before reaching this threshold.
  gibberish_threshold: 0.65

# Chunking settings.
chunking:
  max_tokens: 8191

# Per-stage wallclock caps in seconds (#34). Hard-enforced where
# technically feasible (subprocess.run on ocrmypdf, GrobidClient
# request timeout). Stages without a hard-cap mechanism still record
# timing in summary.json; the value is informational.
stage_timeouts:
  ocr: 1800            # 30 min — long monographs can run scary long
  grobid: 300          # 5 min — enforced by GrobidClient default
  docling: 600         # 10 min — informational only (in-process)
  vision_pass: 600     # 10 min — informational only

# Silent-failure quality gates (#36). Each threshold is conservative
# by default; tighten for stricter corpora. A failed gate emits a
# quality_flag in summary.json — nothing is rejected automatically.
# corpus_status.py (#40) rolls these up so operators can review.
quality_gates:
  empty_text_min_chars: 500           # text.json body shorter than this → "empty_text"
  min_chars_per_page: 200             # text/page ratio below → "low_text_density"
  max_gibberish_score: 0.5            # OCR'd paper still gibberish → "gibberish_after_ocr"
  zero_refs_min_pages: 5              # pages ≥ N but 0 refs → "zero_references_unexpected"
  min_median_chunk_chars: 50          # median chunk shorter → "single_token_chunks"
  min_figure_mean_intensity: 10       # >50% of figures dimmer than this → "all_black_figures"
  max_figures_sampled: 50             # cap PIL load cost on figure-heavy papers

# Cross-paper resources pointed at by the pipeline. These paths are
# resolved relative to the repo root.
resources:
  # Darwin Core taxonomy snapshot (built by ingest_taxonomy.py from any
  # DwC-publishing source: WoRMS, GBIF, iNaturalist, ITIS, or a curated
  # CSV). Empty value disables taxon mention extraction.
  taxonomy_db: "resources/taxonomy.sqlite"
  anatomy_lexicon: "resources/anatomy_lexicon.yaml"
