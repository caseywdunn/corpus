# Configuration for corpus processing workflow

# Input/Output directories
input_dir: "demo"
output_dir: "output"

# OCR settings
ocr:
  language_detection: true
  redo_ocr: true
  deskew: true
  rotate_pages: true
  optimize_level: 2
  # Tesseract traineddata codes used when language detection fails or when
  # a document has a broken text layer (where detection is unreliable).
  # Tesseract combines languages gracefully but slowly — narrow this list
  # if you're running against a known-monolingual subset.
  ocr_languages_default:
    - eng
    - deu
    - deu_latf    # 19th-c. German Fraktur (requires manual install; see README)
    - fra
    - rus
    - lat
  # Gibberish-score threshold above which a dense text layer is treated as
  # corrupt (needing --force-ocr). See _gibberish_score in process_corpus.py.
  gibberish_threshold: 0.5

# Chunking settings
chunking:
  max_tokens: 8191
  model_name: "text-embedding-3-small"
  merge_peers: true

# Embedding settings
embedding:
  model: "text-embedding-3-small"
  dimensions: 1536
  batch_size: 100

# Vector database settings
vector_db:
  path: "output/lancedb"
  table_name: "document_chunks"

# Quality control
qc:
  enable_validation: true
  sample_size: 5