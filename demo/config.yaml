# Demo corpuscle config (#59).
#
# Per the v0.3 "demo as regular corpuscle" model: this directory is
# self-contained — 11 PDFs, siphonophores.bib, lexicon.yaml,
# instructions.md, and this config. Running the demo is identical to
# running any other corpuscle: `cd demo && corpus run` (lands #60).
#
# Output goes to demo/output/ (covered by .gitignore's `output*/`
# pattern; no separate .gitignore needed).

input_pdfs: .

output_dir: ./output

bib: ./siphonophores.bib

lexicon: ./lexicon.yaml

# Pre-built Siphonophorae (order, WoRMS AphiaID 1371, ~1200 records)
# shipped alongside the corpuscle as a Darwin Core Archive. Built once
# from WoRMS via `corpus taxonomy export` and committed to the repo —
# this means `corpus run` ingests the demo's full taxonomy in seconds
# from a local file instead of spending ~10 min walking the rate-
# limited WoRMS REST API on every fresh build. Re-export with:
#   python -m pipeline.taxonomy_ingest /tmp/siph --source worms --root-id 1371
#   corpus taxonomy export --output-dir /tmp/siph -o demo/taxonomy.zip
taxonomy:
  source: dwca
  path: ./taxonomy.zip

# Figure panel-ROI detection (#102). `ocr` is the CPU-only default
# floor — no CUDA / MPS / ANTHROPIC_API_KEY needed, so the demo runs
# anywhere. Switch panel_detection to `vision-local` or `vision-claude`
# (and add ANTHROPIC_API_KEY for the latter) to validate Pass 3b, or
# `off` to skip panel ROIs entirely.
figures:
  panel_detection: ocr

grobid:
  url: http://localhost:8070

bibliography:
  enrich_bhl: false

licensing:
  pd_cutoff_years: 95
