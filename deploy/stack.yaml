AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Corpus MCP server deploy: one EC2 instance, an S3 bucket for versioned
  bundles, and an IAM role letting the instance pull bundles from S3.

  TLS terminates at an AWS ALB (*.siphonophores.org ACM cert); this EC2
  only listens on :80.  See deploy/nginx.conf and DEPLOY.md for the ALB
  setup (security groups, target group, listener rules, idle-timeout).

  One template per organism EC2 — each gets its own stack, its own S3
  bucket, and is registered into a shared target group on the ALB.

Parameters:
  BucketName:
    Type: String
    Description: >
      Globally-unique S3 bucket for versioned serve bundles.
      Must be lowercase, no underscores, e.g. "corpus-bundles-dunn".
    AllowedPattern: '[a-z0-9][a-z0-9\-]{1,61}[a-z0-9]'

  CreateBucket:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Set to 'false' when the S3 bucket already exists (e.g. owned by a
      previous stack that is still live while you stand up a replacement
      EC2).  The IAM role always gets read access to BucketName regardless
      of this setting.  Default 'true' creates and manages the bucket.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: >
      Existing EC2 key pair name for SSH access.  Create one in the
      console or via `aws ec2 create-key-pair --key-name corpus-mcp
      --query KeyMaterial --output text > ~/.ssh/corpus-mcp.pem`.

  SSHAllowCIDR:
    Type: String
    Description: >
      Source CIDR for SSH (port 22).  Your home/office IP as a /32,
      e.g. "203.0.113.45/32".  NOT 0.0.0.0/0 - leaving SSH open to
      the world is a common cause of brute-force bills.
    AllowedPattern: '\d+\.\d+\.\d+\.\d+/\d+'

  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues: [t3.small, t3.medium, t3.large]
    Description: >
      t3.large gives 8 GB RAM with headroom for LanceDB and concurrent
      collaborators.  Drop to t3.medium/t3.small to cut cost if
      `free -h` shows persistent slack.

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
    Description: >
      Ubuntu 24.04 LTS AMI.  Resolved via SSM Public Parameter so
      it stays current as Canonical ships new patch images.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >
      VPC to place the EC2 instance + security group in.  Required —
      this template does not assume a default VPC exists, since some
      accounts have it intentionally deleted or never had one.
      Default-VPC discovery (when one exists):
          aws ec2 describe-vpcs --filters Name=is-default,Values=true \\
              --query 'Vpcs[0].VpcId' --output text
      Otherwise, list all VPCs with:
          aws ec2 describe-vpcs --query 'Vpcs[].[VpcId,Tags]' --output table

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Public subnet (MapPublicIpOnLaunch=true) within VpcId.  Any
      AZ is fine.  Discover with:
          aws ec2 describe-subnets --filters \\
              Name=vpc-id,Values=$VpcId \\
              Name=map-public-ip-on-launch,Values=true \\
              --query 'Subnets[0].SubnetId' --output text

Conditions:
  ShouldCreateBucket: !Equals [!Ref CreateBucket, 'true']

Resources:

  # ── S3 bucket for versioned bundles ────────────────────────────────
  # Only created when CreateBucket=true (the default for new organisms).
  # Pass CreateBucket=false when the bucket already exists in another
  # stack (e.g. when standing up a replacement EC2 while the old one is
  # still live).  The IAM policy below always grants access by name.

  BundleBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldCreateBucket
    DeletionPolicy: Retain   # don't nuke history on stack delete
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── IAM - let the EC2 instance pull bundles from the bucket ───────

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BundleBucketRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !Sub 'arn:aws:s3:::${BucketName}'
                  - !Sub 'arn:aws:s3:::${BucketName}/*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # ── Networking ─────────────────────────────────────────────────────

  # VpcId + SubnetId are required parameters — explicit so this
  # template works on accounts without a default VPC.

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      # TODO: after creating the ALB and its security group (mcp-alb-sg),
      # restrict the port-80 rule to allow only from mcp-alb-sg instead of
      # 0.0.0.0/0.  This can be done in the console by editing this SG's
      # inbound rules: remove the 0.0.0.0/0 CIDR rule and add a source-SG
      # rule referencing mcp-alb-sg.
      GroupDescription: corpus-mcp - SSH from operator, HTTP from ALB
      SecurityGroupIngress:
        - Description: SSH from operator
          IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAllowCIDR
        - Description: HTTP from ALB (restrict to mcp-alb-sg after ALB is created)
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # ── EC2 instance + Elastic IP ──────────────────────────────────────

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      # Use NetworkInterfaces to force a public IP without needing
      # ec2:AllocateAddress (some org SCPs deny EIPs).  The instance
      # gets an ephemeral public IP that persists for as long as it
      # runs; if the instance is stopped and started the IP may
      # change and the DNS A record will need updating.  For 24/7
      # uptime this is effectively never.
      NetworkInterfaces:
        - DeviceIndex: '0'
          AssociatePublicIpAddress: true
          SubnetId: !Ref SubnetId
          GroupSet: [!Ref SecurityGroup]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            # 40 GB fits: Ubuntu base (~5G) + venv incl torch (~6G) +
            # two bundle versions retained for rollback (~10G each at
            # 1800 papers).  20 GB was tight enough that the first real
            # deploy ran out of space mid-aws-s3-sync.  gp3 at 40 GB
            # is about $3.20/mo in us-east-1.  Live-resizable via
            # aws ec2 modify-volume + growpart + resize2fs if needed.
            VolumeSize: 40
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      Tags:
        - Key: Name
          Value: corpus-mcp
      UserData:
        Fn::Base64: !Sub |
          #!/usr/bin/env bash
          # Minimal bootstrap.  The heavier post-install steps
          # (clone repo, venv, systemd unit, nginx, certbot) are
          # in DEPLOY.md so they're easy to inspect / re-run /
          # debug.  This user-data just puts the host in a known
          # state on first boot.
          set -euo pipefail
          exec > >(tee /var/log/corpus-userdata.log) 2>&1

          # apt-get upgrade on a fresh Ubuntu AMI pulls hundreds of
          # packages and can take 5-10 min, during which SSH users who
          # get in first see half-installed state.  Canonical's AMI is
          # already patched at publish time; targeted install is enough.
          apt-get update -y
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
              python3.12 python3.12-venv python3-pip \
              git nginx \
              ca-certificates curl unzip

          # AWS CLI v2 - Ubuntu 24.04 dropped the 'awscli' apt package
          # (only v1 was in it; v2 is the current standard).  Install
          # from Amazon's official bundle.
          curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
              -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install
          rm -rf /tmp/awscliv2.zip /tmp/aws

          # Create the dedicated user + directory layout.
          id -u corpus &>/dev/null || useradd --system --home-dir /srv/corpus \
              --create-home --shell /bin/bash corpus
          mkdir -p /srv/corpus /etc/corpus
          chown corpus:corpus /srv/corpus

          # Signal completion - ssh in and follow DEPLOY.md from here.
          echo "cloud-init: base packages installed, user+dirs ready" \
              >> /var/log/corpus-userdata.log

Outputs:
  BucketName:
    Description: S3 bucket for serve bundles
    Value: !Ref BucketName

  InstanceId:
    Description: EC2 instance id
    Value: !Ref Instance

  PublicIp:
    Description: >
      Instance public IP.  Persists while the instance is running;
      if you stop/start the instance the IP may change and you'll
      need to update your DNS A record.  For a 24/7 server this is
      effectively never.
    Value: !GetAtt Instance.PublicIp

  PublicDnsName:
    Description: >
      AWS-assigned public DNS name.  Alternative to the IP if you
      prefer a CNAME; also changes if the instance is stopped/started.
    Value: !GetAtt Instance.PublicDnsName

  SSHCommand:
    Description: Ready-to-paste SSH invocation (adjust path to your key)
    Value: !Sub 'ssh -i ~/.ssh/${KeyPairName}.pem ubuntu@${Instance.PublicIp}'
