# nginx reverse-proxy in front of mcp_server.py's SSE listener.
#
# Install: copy to /etc/nginx/sites-available/corpus-mcp, symlink
# into sites-enabled, replace the server_name with your real host,
# then `sudo nginx -t && sudo systemctl reload nginx`.  Let's Encrypt
# via certbot populates the ssl_* paths; see DEPLOY.md §3.
#
# Why a reverse proxy rather than binding mcp_server.py directly to
# 443: (1) nginx handles TLS termination + certbot renewals; (2) if
# we ever want to front additional services on the same host they
# just become new `location` blocks; (3) access logs in a standard
# format land in /var/log/nginx/ alongside everything else.

server {
    listen 80;
    listen [::]:80;
    server_name REPLACE.example.edu;

    # certbot http-01 challenge lives here during renewals.  Certbot's
    # nginx plugin writes the challenge files automatically.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else redirects to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name REPLACE.example.edu;

    # Populated by `sudo certbot --nginx -d REPLACE.example.edu`.
    ssl_certificate     /etc/letsencrypt/live/REPLACE.example.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/REPLACE.example.edu/privkey.pem;

    # TLS hygiene — Mozilla "intermediate" profile 2025.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers.  HSTS is safe here — the server has no non-
    # HTTPS path we ever want a client to fall back to.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # mcp_server.py binds 127.0.0.1:8080 and speaks SSE on /sse +
    # POST /messages/{session}.  Proxy both through with streaming
    # semantics (no buffering, long read timeout).
    location /sse {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /messages/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Anything else is intentionally 404 — no static content here.
    location / {
        return 404;
    }
}
