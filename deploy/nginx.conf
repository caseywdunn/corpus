# nginx reverse-proxy for the corpus MCP server behind an AWS Application
# Load Balancer.  TLS terminates at the ALB — this config handles HTTP/80
# only.  The ALB holds the *.siphonophores.org ACM cert and redirects
# HTTP→HTTPS itself; each EC2 only needs to speak :80.
#
# Two server blocks:
#
#   default_server — catches ALB health-check requests (which use the
#                    instance IP as Host, not corpus.siphonophores.org)
#                    and any other unknown Host values.  Returns 200 on
#                    GET /health, 404 everywhere else.
#
#   REPLACE.example.edu — the named-host proxy.  Forwards /sse and
#                    /messages/ to mcp_server.py on 127.0.0.1:8080.
#
# Deploy on each EC2:
#
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/corpus-mcp
#   sudo sed -i "s/REPLACE.example.edu/corpus.siphonophores.org/g" \
#       /etc/nginx/sites-available/corpus-mcp
#   sudo ln -sf /etc/nginx/sites-available/corpus-mcp /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# For future organism servers (e.g. cnidaria-mcp.siphonophores.org) copy
# this file and change the server_name in the second block — everything
# else is identical.

# ── Default server: ALB health checks + unknown hosts ──────────────────────

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ALB target-group health check.  Served by nginx directly (no proxy to
    # the MCP process) so the ALB considers the instance healthy even during
    # a brief MCP server restart.  ALB health checks send the instance IP as
    # the Host header, which lands in this default block.
    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Unknown hosts and everything else — intentional dead end.
    location / {
        return 404;
    }
}

# ── Named-host proxy ────────────────────────────────────────────────────────
# Replace REPLACE.example.edu with the real hostname during deploy (see above).

server {
    listen 80;
    listen [::]:80;
    server_name REPLACE.example.edu;

    # mcp_server.py binds 127.0.0.1:8080 and speaks SSE on /sse +
    # POST /messages/{session_id}.  Both need streaming semantics
    # (no buffering, long timeout).
    #
    # Host: localhost:8080 is deliberate.  FastMCP's SSE transport has
    # DNS-rebinding protection that rejects any Host value outside its
    # allowlist (default ["127.0.0.1:*", "localhost:*"]).  Forwarding
    # the client's Host ("corpus.siphonophores.org") would get a 421
    # "Invalid Host header" from the SDK even though nginx -t is happy.
    # The upstream is always the loopback process, so localhost:8080
    # is the correct and truthful Host to pass.
    #
    # X-Forwarded-For and X-Real-IP: the ALB adds the real client IP
    # in X-Forwarded-For before forwarding to the EC2.  $remote_addr
    # here is the ALB's internal IP, not the client — so we pull the
    # real IP from the header the ALB set.
    location /sse {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host localhost:8080;
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /messages/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host localhost:8080;
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Liveness probe — mcpsrv.transport._HealthzASGI handles this before
    # bearer-auth, so no token is needed.  Safe to expose: reveals only
    # "the process is up", which is also inferable from a TCP connect.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host localhost:8080;
        access_log off;
    }

    # No static content — everything else is 404.
    location / {
        return 404;
    }
}
