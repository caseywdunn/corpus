[pytest]
testpaths = tests
markers =
    corpus_required: test needs a built demo corpus under demo/output/ (or CORPUS_OUTPUT_DIR). T0 lint CI deselects with `-m "not corpus_required"`; T1/T2 integration CI builds the demo first and then runs corpus_required tests.
    resume_scenario: the 4 + 1 implicit-resume scenario in tests/test_resume_scenario.py. Builds the demo corpuscle itself twice (needs Grobid + ~2 min wall), so default `pytest` deselects it. CI does the equivalent inline in T1/T2's workflow rather than invoking the pytest marker; the pytest version exists for local-dev iteration.
