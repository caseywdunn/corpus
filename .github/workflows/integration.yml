# T1 / T2 — integration tiers (issue #75).
#
# Builds the demo corpuscle end-to-end, runs the corpus_required test
# suite, then exercises the 4 + 1 implicit-resume scenario inline.
# This is where #71 (lancedb 0.30.x list_tables shape) and #70 (bundle
# distill scrubber coverage) would have been caught hours after landing
# instead of weeks later in PLATFORM_SMOKE.md.
#
# Triggers on every push (any branch) plus every PR — main is only
# touched at release, dev is the daily-cadence branch, and we want
# to catch regressions before they reach either. Restricting to
# pushes-on-dev-or-main would mean a topic branch's first signal
# came at PR time, which is too late for the Linux + macOS divergence
# this tier is meant to surface.
#
# Tier breakdown:
#   T1 — ubuntu-24.04 + Grobid (Docker). Builds demo (round 1, 4
#        papers), runs corpus_required tests + SSE round-trip smoke,
#        then copies the held-back Siebert PDF into demo/ and re-runs
#        for the round-2 implicit-resume assertion.
#   T2 — macos-15 (arm64) + grobid.disable: true. Same shape as T1
#        (round 1 → tests → round 2) but without Grobid; reference-
#        extraction tests are skipped (Linux T1 covers that path).
#        Catches macOS-arm64 regressions including platform-specific
#        resume behavior.
#
# T3 (the prior dedicated resume job) was folded into T1+T2 once
# pipeline/io.py:find_all_pdfs was fixed to exclude output_dir: round 2
# is now cheap (only the new paper needs work; round-1's 4 cache-hit),
# so doing it inline saves a whole job and gives both platforms resume
# coverage.

name: T1/T2 — integration

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # T1 — Linux integration with Grobid
  # ─────────────────────────────────────────────────────────────────
  t1-linux:
    name: T1 — demo build + serve (ubuntu-24.04)
    runs-on: ubuntu-24.04
    # Normal wall time is ~13–15 min (round 1 + tests + SSE + round 2).
    # Bumped to 40 to absorb the 1.5–2× slow-runner case before the
    # job hard-kills mid-stage — we saw a 25-min timeout on an
    # otherwise-clean release commit because the runner pool was
    # slow that hour.
    timeout-minutes: 40
    defaults:
      run:
        shell: bash -el {0}

    services:
      # Grobid for reference + metadata extraction. JAVA_OPTS disables
      # cgroup-v2 detection (#72 / 40ae330: lfoppiano/grobid:0.8.1's
      # JVM hits an NPE on cgroup-v2 hosts when container-aware sizing
      # is on — Ubuntu 24.04 GHA runners default to cgroup v2).
      grobid:
        image: lfoppiano/grobid:0.8.1
        ports:
          - 8070:8070
        env:
          JAVA_OPTS: "-XX:-UseContainerSupport -Xmx4g -Xms1g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        # The ubuntu-24.04 runner ships ~25–30 GB of preinstalled
        # toolchains we never use (Android SDK, .NET, GHC/ghcup, CodeQL).
        # The conda solve + BGE-M3 model + Grobid service image have
        # intermittently exhausted the disk at "Set up miniforge" with
        # `No space left on device`. Reclaim the big unused dirs up front.
        #
        # Done as a plain `rm -rf` rather than a third-party action to
        # keep CI dependency-light (matches the action-pinning hygiene
        # here) and to avoid any chance of disturbing the running Grobid
        # `services:` container. Best-effort: missing paths must not fail
        # the job (`|| true`). No `docker image prune` — Grobid's image
        # is in use by the live service container.
        run: |
          echo "disk before:"; df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          echo "disk after:"; df -h /

      - name: Set up miniforge + conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: corpus
          environment-file: environment.yaml
          use-mamba: true
          # environment.yaml lists `- nodefaults` to keep the
          # anaconda.com `defaults` channel out of the solve. The
          # implicit removal of `defaults` is being deprecated;
          # this opt-in tells setup-miniconda to do the removal
          # explicitly instead.
          conda-remove-defaults: "true"

      - name: Cache HuggingFace model hub (BGE-M3 + docling)
        uses: actions/cache@v4
        with:
          # Whole hub cache: BGE-M3 (embed stage) + docling's layout /
          # tableformer / picture-classifier models. extract.py leaves
          # docling's artifacts_path unset, so its download_hf_model uses
          # snapshot_download(local_dir=None) → here, same as BGE-M3.
          # Caching only the BGE-M3 subdir (the old key) left docling's
          # models re-downloaded every run, which 429'd and reded the lane.
          # Both model sets are immutable for the versions pinned in the
          # key, so a single static key is safe.
          path: ~/.cache/huggingface/hub
          key: hf-hub-${{ runner.os }}-bge-m3-docling2.94.0-v1

      - name: Editable install
        run: pip install --quiet -e .

      - name: Prefetch docling models into HF cache (retry on HF 429)
        # docling downloads its models from HuggingFace on first use.
        # Anonymous GHA IPs intermittently get HTTP 429'd, which fails
        # extraction with "zero chunks" (#99 fail-loud). Warm the cache
        # once here with backoff so a transient throttle doesn't sink the
        # lane; the cache step above then persists it across runs. Mirrors
        # extract.py's pipeline options so exactly the needed models warm.
        working-directory: demo
        run: |
          python - <<'PY'
          import glob, sys, time
          from docling.document_converter import DocumentConverter, PdfFormatOption
          from docling.datamodel.base_models import InputFormat
          from docling.datamodel.pipeline_options import PdfPipelineOptions
          opts = PdfPipelineOptions(
              do_ocr=False, do_table_structure=True,
              generate_picture_images=True, do_picture_classification=True,
          )
          conv = DocumentConverter(
              format_options={InputFormat.PDF: PdfFormatOption(pipeline_options=opts)}
          )
          pdf = sorted(glob.glob("*.pdf"))[0]
          for i in range(1, 7):
              try:
                  conv.convert(pdf)
                  print(f"docling model prefetch ok (attempt {i})")
                  break
              except Exception as e:
                  print(f"prefetch attempt {i} failed: {e}", flush=True)
                  time.sleep(i * 20)
          else:
              sys.exit("docling model prefetch failed after 6 attempts")
          PY

      - name: Install system tools (ghostscript, tesseract, jq)
        # ocrmypdf needs ghostscript + tesseract on PATH; jq is used
        # by the bundle-manifest verification step below.
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            ghostscript tesseract-ocr jq
          bash tools/install_tessdata.sh

      - name: Wait for Grobid
        # `exit 0` inside this loop conflicts with the EXIT trap that
        # setup-miniconda's `bash -el {0}` shell installs (conda deactivate
        # was returning non-zero, propagating an exit-1 to the step even
        # after "Grobid alive after 2s" printed). Break out of the loop
        # instead and let the script exit naturally.
        run: |
          ready=0
          for i in $(seq 1 60); do
            if [ "$(curl -fsS http://localhost:8070/api/isalive 2>/dev/null)" = "true" ]; then
              echo "Grobid alive after $((i * 2))s"
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "Grobid did not become ready within 120s"
            exit 1
          fi

      - name: corpus check
        working-directory: demo
        run: corpus check

      - name: corpus run (no vision) on demo
        working-directory: demo
        run: corpus -v run --no-vision 2>&1 | tee /tmp/run.log

      - name: Verify bundle manifest + audit clean
        working-directory: demo
        run: |
          manifest=output/_serve/bundle_manifest.json
          test -f "$manifest" || { echo "bundle_manifest.json missing"; exit 1; }
          paper_count=$(jq -r '.paper_count' "$manifest")
          [ "$paper_count" = "4" ] \
            || { echo "paper_count=$paper_count (expected 4)"; exit 1; }
          grep -qE "Path scrub: rewrote [0-9]+ files; audit clean\." /tmp/run.log \
            || { echo "served-bundle absolute-path audit (#70) did not log 'audit clean'"; exit 1; }
          test -f output/instructions.md \
            || { echo "instructions.md not shepherded to output root"; exit 1; }
          test -f output/_serve/instructions.md \
            || { echo "instructions.md not in served bundle"; exit 1; }

      - name: Run corpus_required tests against built demo
        # CORPUS_OUTPUT_DIR is set so tests/conftest.py points the
        # ground-truth fixtures at this run's output. test_corpus_wide.py
        # + test_reference_extraction.py + test_figure_extraction.py +
        # test_text_extraction.py all parametrize over demo PDFs.
        #
        # --deselect: TestMetadataPlausibility's text-overlap checks compare
        # metadata.title / metadata.authors against text.json body. They
        # fail on the demo's Russian (Stepanjants, Latin bib title vs
        # Cyrillic OCR text) and Marrus (bib title vs PDF text formatting)
        # papers — the bib supplies canonical citation forms, text comes
        # from the PDF; they're not expected to match verbatim across
        # alphabets / punctuation. The other plausibility checks in the
        # same class (year range, author count) still run.
        env:
          CORPUS_OUTPUT_DIR: ${{ github.workspace }}/demo/output
        run: |
          python -m pytest -v --tb=short -m "corpus_required" \
            --deselect tests/test_corpus_wide.py::TestMetadataPlausibility::test_first_author_surname_in_text \
            --deselect tests/test_corpus_wide.py::TestMetadataPlausibility::test_title_appears_in_text \
            --deselect tests/test_corpus_wide.py::TestCitationGraph::test_references_match_corpus_papers

      - name: MCP / SSE round-trip smoke
        run: python tools/smoke_test_sse.py demo/output/_serve --port 18080

      - name: Resume scenario (round 2 — copy Siebert, re-run, assert)
        # Folded in from the prior dedicated T3 job. Round 1 above
        # built 4 papers; this adds the 5th from tests/fixtures/round2_paper/
        # and re-runs. The #71 invariant is `skipped == 4` (round-1's
        # markers honored) and `embedded >= 1` (the new paper picked up).
        working-directory: demo
        run: |
          cp ../tests/fixtures/round2_paper/Siebert_etal2011.pdf .
          corpus -v run --no-vision 2>&1 | tee /tmp/round2.log

          tally=$(grep -oE "Done\. embedded=[0-9]+, skipped=[0-9]+, failed=[0-9]+" /tmp/round2.log | tail -1)
          test -n "$tally" || { echo "embed-stage tally line missing"; exit 1; }
          echo "round 2 embed tally: $tally"
          embedded=$(echo "$tally" | grep -oE "embedded=[0-9]+" | cut -d= -f2)
          skipped=$(echo "$tally" | grep -oE "skipped=[0-9]+" | cut -d= -f2)
          failed=$(echo "$tally" | grep -oE "failed=[0-9]+" | cut -d= -f2)
          [ "$skipped" = "4" ] && [ "$embedded" -ge 1 ] && [ "$failed" = "0" ] \
            || { echo "round 2 tally violates #71 invariant: embedded=$embedded skipped=$skipped failed=$failed (expected skipped=4 embedded>=1 failed=0)"; exit 1; }

          paper_count=$(jq -r '.paper_count' output/_serve/bundle_manifest.json)
          [ "$paper_count" = "5" ] \
            || { echo "round 2 paper_count=$paper_count (expected 5)"; exit 1; }

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: t1-run-log
          path: |
            /tmp/run.log
            /tmp/round2.log
            demo/output/_serve/bundle_manifest.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # T2 — macOS arm64 (no Grobid)
  # ─────────────────────────────────────────────────────────────────
  t2-macos:
    name: T2 — demo build + serve (macos-15, no Grobid)
    runs-on: macos-15
    # See T1's note. Normal T2 wall is ~10 min; 40 keeps the
    # ceiling symmetric with Linux for the slow-runner case.
    timeout-minutes: 40
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up miniforge + conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: corpus
          environment-file: environment.yaml
          use-mamba: true
          # environment.yaml lists `- nodefaults` to keep the
          # anaconda.com `defaults` channel out of the solve. The
          # implicit removal of `defaults` is being deprecated;
          # this opt-in tells setup-miniconda to do the removal
          # explicitly instead.
          conda-remove-defaults: "true"

      - name: Cache HuggingFace model hub (BGE-M3 + docling)
        uses: actions/cache@v4
        with:
          # See the T1 note: cache the whole hub so docling's models
          # (downloaded via snapshot_download(local_dir=None)) persist
          # across runs instead of re-fetching + 429'ing every time.
          path: ~/.cache/huggingface/hub
          key: hf-hub-${{ runner.os }}-bge-m3-docling2.94.0-v1

      - name: Editable install
        run: pip install --quiet -e .

      - name: Prefetch docling models into HF cache (retry on HF 429)
        # See the T1 step. macOS T2 runs the same `corpus run --no-vision`
        # and hits the same docling download path, so warm it here too.
        working-directory: demo
        run: |
          python - <<'PY'
          import glob, sys, time
          from docling.document_converter import DocumentConverter, PdfFormatOption
          from docling.datamodel.base_models import InputFormat
          from docling.datamodel.pipeline_options import PdfPipelineOptions
          opts = PdfPipelineOptions(
              do_ocr=False, do_table_structure=True,
              generate_picture_images=True, do_picture_classification=True,
          )
          conv = DocumentConverter(
              format_options={InputFormat.PDF: PdfFormatOption(pipeline_options=opts)}
          )
          pdf = sorted(glob.glob("*.pdf"))[0]
          for i in range(1, 7):
              try:
                  conv.convert(pdf)
                  print(f"docling model prefetch ok (attempt {i})")
                  break
              except Exception as e:
                  print(f"prefetch attempt {i} failed: {e}", flush=True)
                  time.sleep(i * 20)
          else:
              sys.exit("docling model prefetch failed after 6 attempts")
          PY

      - name: Architecture sanity (arm64)
        # Guards against the long-tail "tesseract installed under
        # Rosetta x86_64" failure mode that PLATFORM_SMOKE.md flags.
        run: |
          arch=$(python -c "import platform; print(platform.machine())")
          [ "$arch" = "arm64" ] \
            || { echo "expected arm64, got $arch"; exit 1; }

      - name: Disable Grobid in demo config
        # Docker Desktop isn't installed on GHA macOS runners. The
        # pipeline supports grobid.disable: true — metadata then comes
        # solely from --bib siphonophores.bib, which is what we want
        # this leg to validate. Linux T1 still exercises the Grobid path.
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("demo/config.yaml")
          text = p.read_text()
          if "disable:" not in text:
              text = text.replace(
                  "grobid:\n  url: http://localhost:8070",
                  "grobid:\n  url: http://localhost:8070\n  disable: true",
              )
              p.write_text(text)
          print(text)
          PY

      - name: corpus check
        working-directory: demo
        run: corpus check

      - name: corpus run (no vision) on demo
        working-directory: demo
        run: corpus -v run --no-vision 2>&1 | tee /tmp/run.log

      - name: Verify bundle manifest
        working-directory: demo
        run: |
          manifest=output/_serve/bundle_manifest.json
          test -f "$manifest" || { echo "bundle_manifest.json missing"; exit 1; }
          python -c "import json; m=json.load(open('$manifest')); assert m['paper_count']==4, m"

      - name: Run corpus_required tests against built demo
        env:
          CORPUS_OUTPUT_DIR: ${{ github.workspace }}/demo/output
        # Reference / metadata tests assume Grobid; on macOS T2 with
        # grobid.disable: true, references.json comes from the --bib
        # path only. Skip the reference-extraction parametrized tests
        # here; T1 covers the Grobid path. Same --deselect rationale
        # as T1 for the two text-overlap plausibility checks.
        run: |
          python -m pytest -v --tb=short -m "corpus_required" \
            --ignore=tests/test_reference_extraction.py \
            --deselect tests/test_corpus_wide.py::TestMetadataPlausibility::test_first_author_surname_in_text \
            --deselect tests/test_corpus_wide.py::TestMetadataPlausibility::test_title_appears_in_text \
            --deselect tests/test_corpus_wide.py::TestCitationGraph::test_references_match_corpus_papers

      - name: Resume scenario (round 2 — copy Siebert, re-run, assert)
        # Same inline check as T1 but without Grobid. Exercises the
        # implicit-resume path on macOS so a darwin-specific LanceDB
        # persistence regression would surface here.
        working-directory: demo
        run: |
          cp ../tests/fixtures/round2_paper/Siebert_etal2011.pdf .
          corpus -v run --no-vision 2>&1 | tee /tmp/round2.log

          tally=$(grep -oE "Done\. embedded=[0-9]+, skipped=[0-9]+, failed=[0-9]+" /tmp/round2.log | tail -1)
          test -n "$tally" || { echo "embed-stage tally line missing"; exit 1; }
          echo "round 2 embed tally: $tally"
          embedded=$(echo "$tally" | grep -oE "embedded=[0-9]+" | cut -d= -f2)
          skipped=$(echo "$tally" | grep -oE "skipped=[0-9]+" | cut -d= -f2)
          failed=$(echo "$tally" | grep -oE "failed=[0-9]+" | cut -d= -f2)
          [ "$skipped" = "4" ] && [ "$embedded" -ge 1 ] && [ "$failed" = "0" ] \
            || { echo "round 2 tally violates #71 invariant: embedded=$embedded skipped=$skipped failed=$failed (expected skipped=4 embedded>=1 failed=0)"; exit 1; }

          paper_count=$(jq -r '.paper_count' output/_serve/bundle_manifest.json 2>/dev/null \
            || python -c "import json; print(json.load(open('output/_serve/bundle_manifest.json'))['paper_count'])")
          [ "$paper_count" = "5" ] \
            || { echo "round 2 paper_count=$paper_count (expected 5)"; exit 1; }

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: t2-run-log
          path: |
            /tmp/run.log
            /tmp/round2.log
            demo/output/_serve/bundle_manifest.json
          if-no-files-found: ignore

