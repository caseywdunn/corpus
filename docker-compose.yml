# Grobid service for bibliographic and structural extraction from scientific PDFs.
#
# Usage:
#     docker compose up -d grobid       # start in background
#     docker compose ps                  # check status
#     docker compose logs -f grobid      # follow logs
#     docker compose down                # stop
#
# The corpus pipeline will auto-detect a running Grobid on GROBID_URL
# (default http://localhost:8070). When Grobid is not reachable the
# pipeline falls back to a placeholder metadata step with a warning — so
# dev iteration without Docker still works.
#
# On Bouchet / YCRC, Singularity converts the same image:
#     singularity build grobid.sif docker://lfoppiano/grobid:0.8.1
#     singularity run --bind $HOME grobid.sif  (with port forwarding)
# See PLAN.md for HPC deployment notes.

services:
  grobid:
    # grobid/grobid is the full image with DeLFT deep-learning reference
    # parsing (~32 GB on disk with all bundled models — `more disk and ram
    # are OK for improved quality` per the project decision). Linux/amd64
    # only; runs under Rosetta on Apple Silicon. If you need a smaller
    # footprint (CI, low-disk machines), swap to the CRF-only lightweight
    # image by changing this line to: ``lfoppiano/grobid:0.8.1``.
    image: grobid/grobid:0.8.1
    container_name: corpus-grobid
    ports:
      - "8070:8070"
    restart: unless-stopped
    # Grobid is memory-hungry under heavy load; the full deep-learning
    # image more so. 8 GB heap is comfortable on a 32 GB MacBook Pro and
    # fine for batch-processing a 2000-paper corpus on Bouchet. Drop to
    # -Xmx4g if running somewhere tight on memory.
    environment:
      - JAVA_OPTS=-Xmx8g -Xms2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
